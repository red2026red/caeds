<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AR Business Card</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- animation追加 -->
<!-- 削除 -->

<!-- AR.js -->
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0; overflow: hidden;">

<a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">

<!-- 画像を事前読み込み -->
<a-assets>
  <img id="card" src="card.png">   <!-- 名刺 -->
  <img id="icon" src="icon.png">    <!-- 飛び出す画像（追加） -->
</a-assets>

<!-- マーカー -->
<a-marker preset="hiro">

  <!-- 名刺（土台） -->
  <a-plane
    src="#card"
    width="1.5"
    height="1"
    rotation="-90 0 0"
    position="0 0.1 0"
    >
  </a-plane>

  <!-- 飛び出す画像 -->
  <a-image
  src="#icon"
  width="0.7"
  height="0.7"
  position="0.5 -0.05 0"
  rotation="-75 0 0"
  animation__move="property: position; to: 0.5 1 0; dir: alternate; dur: 1000; loop: true;"
  </a-image>

</a-marker>

<!-- カメラ -->
<a-entity camera></a-entity>

</a-scene>

</body>
</html>
